<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#5fb800;
    --bg:#f4f4f2;
    --card:#ffffff;
    --border:#e8e8e6;
    --text:#1a1a1a;
    --muted:#8a8a86;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.06);
  }
  html.dark{
    --accent:#78e700;
    --bg:#0a0a0a;
    --card:#141414;
    --border:#242424;
    --text:#f0f0f0;
    --muted:#828282;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 20px 50px rgba(0,0,0,0.5);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
    transition:background .35s ease, color .35s ease;
  }

  .theme-toggle{
    position:fixed;
    top:20px;
    right:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    background:var(--card);
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform .2s ease, background .35s ease, border-color .35s ease;
    z-index:5;
  }
  .theme-toggle:hover{ transform:scale(1.06); }
  .theme-toggle svg{ width:19px; height:19px; stroke:var(--text); fill:none; stroke-width:1.8; }
  .theme-toggle .moon{ display:none; }
  html.dark .theme-toggle .sun{ display:none; }
  html.dark .theme-toggle .moon{ display:block; }

  .card{
    width:100%;
    max-width:380px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:40px 30px 30px;
    box-shadow:var(--shadow);
    transition:background .35s ease, border-color .35s ease, box-shadow .35s ease;
  }

  .header{
    text-align:center;
    margin-bottom:34px;
  }
  .avatar{
    width:104px;
    height:104px;
    margin:0 auto 18px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid var(--card);
    box-shadow:0 0 0 2px var(--accent), 0 8px 24px rgba(0,0,0,0.12);
    transition:box-shadow 0.3s ease;
  }
  .avatar.status-online{
    box-shadow:0 0 0 3px #2ecc71, 0 8px 24px rgba(0,0,0,0.12);
  }
  .avatar.status-offline{
    box-shadow:0 0 0 3px #e74c3c, 0 8px 24px rgba(0,0,0,0.12);
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .name{
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:26px;
    color:var(--text);
    letter-spacing:0.2px;
  }
  .tag{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:500;
  }
  .tag .dot{ color:var(--accent); }

  .links{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 16px;
    background:transparent;
    border:1px solid var(--border);
    border-radius:16px;
    text-decoration:none;
    color:var(--text);
    transition:border-color .2s ease, background .2s ease, transform .15s ease;
  }
  .link-btn:hover{
    border-color:var(--accent);
    background:color-mix(in srgb, var(--accent) 6%, transparent);
    transform:translateY(-1px);
  }
  .link-btn:active{ transform:translateY(0) scale(.98); }

  .icon{
    flex:0 0 auto;
    width:40px;
    height:40px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
  }
  .icon svg{ width:20px; height:20px; }

  .link-text{ flex:1; min-width:0; }
  .platform{
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--text);
  }
  .handle{
    font-size:12px;
    color:var(--muted);
    margin-top:1px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .arrow{
    flex:0 0 auto;
    color:var(--muted);
    font-size:15px;
    transition:transform .2s ease, color .2s ease;
  }
  .link-btn:hover .arrow{
    transform:translateX(3px);
    color:var(--accent);
  }
</style>
</head>

  <svg class="moon" viewBox="0 0 24 24"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>
</button>

<script>
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
}

// Сайт и API теперь на одном домене, поэтому достаточно относительного пути
const STATUS_API_URL = '/api/status';

async function updateStatusIndicator(){
  const textEl = document.getElementById('status-text');
  const avatarEl = document.getElementById('avatar-ring');
  try{
    const res = await fetch(STATUS_API_URL, { cache: 'no-store' });
    const data = await res.json();
    const isOnline = data.status === 'online';
    textEl.textContent = isOnline ? 'online' : 'offline';
    avatarEl.classList.toggle('status-online', isOnline);
    avatarEl.classList.toggle('status-offline', !isOnline);
  }catch(err){
    textEl.textContent = 'offline';
    avatarEl.classList.remove('status-online');
    avatarEl.classList.add('status-offline');
  }
}

updateStatusIndicator();
setInterval(updateStatusIndicator, 120000); // обновляем раз в 2 минуты
</script>
